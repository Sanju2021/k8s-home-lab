# Paste your Ansible kubeadm playbook here
---
- name: Initialize Kubernetes Control Plane
  hosts: k8s-master-01
  become: yes
  tasks:
    - name: Initialize the Kubernetes cluster using kubeadm
      command: kubeadm init --apiserver-advertise-address={{ ansible_host }} --pod-network-cidr=10.244.0.0/16
      args:
        creates: /etc/kubernetes/admin.conf
      register: kubeadm_init
      
    - name: Create .kube directory for the local user
      file:
        path: /home/{{ ansible_user }}/.kube
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy admin.conf to user's kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/{{ ansible_user }}/.kube/config
        remote_src: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    - name: Download Calico network manifest
      get_url:
        url: https://raw.githubusercontent.com/projectcalico/calico/v3.26.1/manifests/custom-resources.yaml
        dest: /tmp/calico-custom-resources.yaml
      # Note: The Tigera operator requires the operator manifest first
      
    - name: Install Tigera Operator for Calico
      become_user: "{{ ansible_user }}"
      command: kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.26.1/manifests/tigera-operator.yaml
      ignore_errors: yes

    - name: Configure Calico to use our Pod CIDR (10.244.0.0/16)
      replace:
        path: /tmp/calico-custom-resources.yaml
        regexp: 'cidr: 192\.168\.0\.0/16'
        replace: 'cidr: 10.244.0.0/16'

    - name: Apply Calico network configuration
      become_user: "{{ ansible_user }}"
      command: kubectl create -f /tmp/calico-custom-resources.yaml
      ignore_errors: yes

    - name: Generate the kubeadm join command for workers
      command: kubeadm token create --print-join-command
      register: join_command_raw

    - name: Store join command as a fact
      set_fact:
        worker_join_command: "{{ join_command_raw.stdout }}"


- name: Join Worker Nodes to the Cluster
  hosts: workers
  become: yes
  tasks:
    - name: Execute the kubeadm join command
      command: "{{ hostvars['k8s-master-01']['worker_join_command'] }}"
      args:
        creates: /etc/kubernetes/kubelet.conf
